---
Brewfile:
  common:
    brews:
      - "ansible"  # Automate deployment, configuration, and upgrading
      - "ansible-lint"  # Checks ansible playbooks for practices and behaviour
      - "chezmoi"  # Manage your dotfiles across multiple diverse machines, securely
      - "coreutils"  # GNU File, Shell, and Text utilities
      - "git-delta"  # Syntax-highlighting pager for git and diff output
      - "gnu-sed"  # GNU implementation of the famous stream editor
      - "grep"  # GNU grep, egrep and fgrep
      - "just"  # Handy way to save and run project-specific commands
      - "mas"  # Mac App Store command-line interface
      - "pre-commit"  # Framework for managing multi-language pre-commit hooks
      - "python3"  # Interpreted, interactive, object-oriented programming language
      - "xdg-ninja"  # Check your $HOME for unwanted files and directories
      - "yamllint"  # Linter for YAML files
    casks:
      - "1password"  # Password manager that keeps all passwords secure behind one password
      - "1password-cli"  # Command-line interface for 1Password
      - "arc"  # Chromium based browser
      - "font-jetbrains-mono-nerd-font"  # JetBrainsMono Nerd Font families (JetBrains Mono)
      - "istherenet"  # Your internet connection status at a glance
      - "iterm2"
      - "jetbrains-toolbox"  # JetBrains tools manager
      - "keymapp"  # ZSA keyboard firmware flasher
      - "kitty"
      - "orbstack"  # Replacement for Docker Desktop
      - "proton-pass"  # Desktop client for Proton Pass
      - "raspberry-pi-imager"  # Imaging utility to install operating systems to a microSD card
      - "raycast"  # Control your tools with a few keystrokes
      - "setapp"  # Collection of apps available by subscription
      - "tailscale"  # Mesh VPN based on WireGuard
      - "yubico-authenticator"  # Application for generating TOTP and HOTP codes
      - "zed"
    taps: []
  personal:
    brews:
      - "detect-secrets"
      - "gitleaks"
    casks:
      - "balenaetcher"
      - "creality-print"
      - "discord"
      - "itch"
      - "openscad"
      - "orcaslicer"
      - "protonvpn"
      - "sonos"
      - "steam"
      - "transmission"
      - "zen-browser"
    taps: []
  work:
    brews:
      - "action-docs"  # Generate docs for GitHub actions
      - "aws-cdk"
      - "aws-sso-util"
      - "awscli"
      - "black"
      - "codeowners-validator"
      - "gh"
      - "go"
      - "granted"
      - "infracost"
      - "kuzco"
      - "pyenv"
      - "pyenv-virtualenv"
      - "shellcheck"
      - "sketchybar"
      - "tenv"
      - "terraform-docs"
      - "tflint"
      - "tmuxinator"
      - "tpm"
      - "tree"
      - "trivy"
      - "yq"
      - "zizmor"
      - "gettext"
      - "libunistring"
    casks:
      - "aerospace"
      - "visual-studio-code"
      - "session-manager-plugin"
    taps:
      - "common-fate/granted"
      - "felixkratz/formulae"
      - "homebrew/bundle"
      - "mszostok/tap"
      - "homebrew/services"
      - "nikitabobko/tap"
